name: Markdown maintenance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.md"
      - "scripts/**/*.py"
      - "tests/**/*.py"
      - "config/*.json"
      - ".github/workflows/markdown-maintenance.yml"
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "scripts/**/*.py"
      - "tests/**/*.py"
      - "config/*.json"
      - ".github/workflows/markdown-maintenance.yml"

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test toolkit scripts
        run: python -m unittest discover -s tests -v

      - name: Validate template structure
        run: python scripts/validate_templates.py

      - name: Audit conditional completeness
        run: >-
          python scripts/audit_completeness.py templates
          --policy config/readiness-completeness-policy.example.json

      - name: Run unified readiness gate
        run: >-
          python scripts/audit_readiness.py
          examples/readiness-gate-passing-record.md
          --status-policy config/readiness-status-policy.example.json
          --completeness-policy config/readiness-completeness-policy.example.json
          --as-of 2026-07-21
          --output "$RUNNER_TEMP/readiness-gate.md"

      - name: Audit commissioning evidence traceability
        run: >-
          python scripts/audit_evidence_traceability.py
          examples/commissioning-evidence-traceability-passing.md
          --output "$RUNNER_TEMP/evidence-traceability.md"

      - name: Audit instrument calibration traceability
        run: >-
          python scripts/audit_calibration_traceability.py
          examples/calibration-traceability-passing.md
          --output "$RUNNER_TEMP/calibration-traceability.md"

      - name: Audit punch-list closeout
        run: >-
          python scripts/audit_punch_list.py
          examples/punch-list-closeout-passing.md
          --as-of 2026-07-21
          --output "$RUNNER_TEMP/punch-list-closeout.md"

      - name: Audit handover acceptance
        run: >-
          python scripts/audit_handover_acceptance.py
          examples/handover-acceptance-passing.md
          --policy config/handover-acceptance-policy.example.json
          --output "$RUNNER_TEMP/handover-acceptance.md"

      - name: Audit handover document control
        run: >-
          python scripts/audit_document_control.py
          examples/document-control-passing.md
          --as-of 2026-07-21
          --output "$RUNNER_TEMP/document-control.md"

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress README.md CONTRIBUTING.md
            examples/*.md templates/*.md
          fail: true
