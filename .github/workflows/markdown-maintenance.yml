name: Markdown maintenance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.md"
      - "scripts/**/*.py"
      - "tests/**/*.py"
      - "config/*.json"
      - ".github/workflows/markdown-maintenance.yml"
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "scripts/**/*.py"
      - "tests/**/*.py"
      - "config/*.json"
      - ".github/workflows/markdown-maintenance.yml"

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test toolkit scripts
        run: python -m unittest discover -s tests -v

      - name: Validate template structure
        run: python scripts/validate_templates.py

      - name: Audit conditional completeness
        run: >-
          python scripts/audit_completeness.py templates
          --policy config/readiness-completeness-policy.example.json

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md CONTRIBUTING.md templates/*.md
          fail: true
